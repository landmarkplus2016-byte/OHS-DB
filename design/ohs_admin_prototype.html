<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="blue">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OHS DB — Admin Prototype</title>
<style>
:root{
  --bg:#f5f6fa; --card:#ffffff; --border:#e2e4ed;
  --text:#1a1d2e; --text2:#4a4f6a; --muted:#9095b0;
  --primary:#3d5af1; --primary-dark:#2d47d4; --primary-soft:#3d5af11f;
  --success:#16a34a; --warning:#d97706; --danger:#e05252;
  --purple:#7c3aed; --teal:#0d9488;
  --st-complete-bg:#dcfce7; --st-complete-tx:#15803d;
  --st-prog-bg:#fef3c7;    --st-prog-tx:#b45309;
  --st-new-bg:#ede9fe;     --st-new-tx:#6d28d9;
  --st-danger-bg:#fee2e2;  --st-danger-tx:#991b1b;
  --st-warn-bg:#ffedd5;    --st-warn-tx:#9a3412;
  --radius-card:14px; --radius-control:8px;
  --shadow-sm:0 1px 2px rgba(16,24,64,.05);
  --shadow-md:0 4px 14px rgba(16,24,64,.08);
  --font-base:'Segoe UI',system-ui,-apple-system,sans-serif;
  --navy:#0f1942; --navy-soft:#16215a; --navy-border:#232c63;
  --navy-text:#aab2d8; --navy-text-strong:#ffffff; --navy-muted:#6b74a8;
  --theme-color-blue:#3d5af1; --theme-color-teal:#0d9488;
  --theme-color-purple:#7c3aed; --theme-color-crimson:#be123c;
}
[data-theme="blue"]{--primary:#3d5af1;--primary-dark:#2d47d4;--primary-soft:#3d5af11f;}
[data-theme="teal"]{--primary:#0d9488;--primary-dark:#0b7a70;--primary-soft:#0d94881f;}
[data-theme="purple"]{--primary:#7c3aed;--primary-dark:#6425c9;--primary-soft:#7c3aed1f;}
[data-theme="crimson"]{--primary:#be123c;--primary-dark:#9f0f32;--primary-soft:#be123c1f;}

*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-base);font-size:14px}
button{font-family:inherit;font-size:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
[dir="rtl"]{font-family:'Segoe UI','Tahoma',system-ui,sans-serif}

/* ---------- Shell ---------- */
.app{display:flex;min-height:100vh}
.sidebar{width:230px;background:var(--navy);color:var(--navy-text);display:flex;flex-direction:column;border-inline-end:1px solid var(--navy-border);position:sticky;top:0;height:100vh}
.side-logo{padding:20px 22px;border-block-end:1px solid var(--navy-border)}
.side-logo .mark{color:var(--primary);font-weight:800;font-size:20px;letter-spacing:.5px}
.side-logo .name{color:var(--navy-text-strong);font-weight:700;font-size:15px;margin-top:2px}
.side-logo .sub{color:var(--navy-muted);font-size:11px;margin-top:2px}
.nav{padding:12px 0;flex:1;overflow-y:auto}
.nav a{display:flex;align-items:center;gap:10px;padding:10px 22px;color:var(--navy-text);text-decoration:none;font-size:13.5px;border-inline-start:3px solid transparent}
.nav a:hover{background:rgba(255,255,255,.04);color:var(--navy-text-strong)}
.nav a.active{background:rgba(255,255,255,.08);color:var(--navy-text-strong);border-inline-start-color:var(--primary)}
.nav a .ic{width:16px;text-align:center;opacity:.8}
.side-bottom{padding:14px 22px;border-block-start:1px solid var(--navy-border)}
.swatches{display:flex;gap:8px;margin-bottom:12px}
.swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.swatch.blue{background:var(--theme-color-blue)}
.swatch.teal{background:var(--theme-color-teal)}
.swatch.purple{background:var(--theme-color-purple)}
.swatch.crimson{background:var(--theme-color-crimson)}
.swatch.active{border-color:#fff;box-shadow:0 0 0 2px var(--navy)}
.lang-toggle{display:flex;gap:6px;margin-bottom:12px}
.lang-toggle button{flex:1;background:transparent;color:var(--navy-text);border:1px solid var(--navy-border);border-radius:6px;padding:5px;font-size:12px}
.lang-toggle button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.userchip{display:flex;align-items:center;gap:9px;color:var(--navy-text)}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
.userchip .who{font-size:12.5px;color:var(--navy-text-strong)}
.userchip .role{font-size:10.5px;color:var(--navy-muted)}
.side-signout{margin-top:10px;background:transparent;color:var(--navy-muted);border:none;font-size:12px;text-align:start;padding:0;text-decoration:underline}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:#fff;border-block-end:1px solid var(--border);padding:16px 26px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:9}
.topbar .title{font-weight:700;font-size:18px}
.topbar .sub{color:var(--text2);font-size:12.5px;margin-top:1px}
.topbar-actions{display:flex;gap:8px;align-items:center}
.dirty-dot{width:8px;height:8px;background:var(--warning);border-radius:50%;display:inline-block;margin-inline-end:6px}
.dirty-txt{color:var(--warning);font-size:12px}
.content{padding:26px;flex:1}

/* ---------- Buttons ---------- */
.btn{border-radius:var(--radius-control);padding:9px 15px;font-size:13px;border:1px solid transparent;font-weight:600;display:inline-flex;align-items:center;gap:7px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-ghost{background:transparent;border-color:var(--border);color:var(--text2)}
.btn-ghost:hover{background:var(--bg)}
.btn-danger{background:#fbeaea;color:var(--danger)}
.btn-danger:hover{background:#f6d5d5}
.btn-sm{padding:6px 10px;font-size:12px}

/* ---------- Cards ---------- */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-card);box-shadow:var(--shadow-sm);padding:18px}
.card h3{margin:0 0 10px;font-size:15px;font-weight:700}

/* ---------- Badges ---------- */
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11.5px;font-weight:700}
.badge-cleared{background:var(--st-complete-bg);color:var(--st-complete-tx)}
.badge-warning{background:var(--st-warn-bg);color:var(--st-warn-tx)}
.badge-blocked{background:var(--st-danger-bg);color:var(--st-danger-tx)}
.badge-new{background:var(--st-new-bg);color:var(--st-new-tx)}
.badge-active{background:var(--st-complete-bg);color:var(--st-complete-tx)}
.badge-inactive{background:#f3f4f6;color:#6b7280}
.badge-team-field{background:#e0e7ff;color:#3730a3}
.badge-team-safety{background:#fce7f3;color:#9d174d}

/* ---------- KPI cards ---------- */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:16px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:var(--radius-card);padding:16px;box-shadow:var(--shadow-sm)}
.kpi .n{font-size:32px;font-weight:800}
.kpi .l{color:var(--text2);font-size:12.5px;margin-top:2px}
.kpi.blue .n{color:var(--primary)}
.kpi.red .n{color:var(--danger)}
.kpi.amber .n{color:var(--warning)}
.kpi.green .n{color:var(--success)}
.kpi-split{display:flex;gap:14px;margin-top:8px;font-size:11.5px;color:var(--muted)}
.kpi-split span b{color:var(--text)}

/* ---------- Inputs ---------- */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:12px;color:var(--text2);font-weight:600}
.field input,.field select,.field textarea{border:1px solid var(--border);border-radius:var(--radius-control);padding:9px 10px;background:#fff}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.field.inline{flex-direction:row;align-items:center;gap:8px}

/* ---------- Tables ---------- */
.tbl{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--border);border-radius:var(--radius-card);overflow:hidden}
.tbl th,.tbl td{padding:11px 14px;text-align:start;border-block-end:1px solid var(--border);font-size:13px}
.tbl th{background:#fafbfd;color:var(--text2);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
.tbl tr:last-child td{border-block-end:none}
.tbl tr:hover td{background:#fafbfd}
.tbl .row-clickable{cursor:pointer}

/* ---------- Charts ---------- */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.donut-wrap{display:flex;align-items:center;gap:20px}
.donut-legend{display:flex;flex-direction:column;gap:8px;font-size:12.5px}
.legend-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-inline-end:7px;vertical-align:middle}

/* ---------- Tabs ---------- */
.tabs{display:flex;gap:2px;border-block-end:1px solid var(--border);margin-bottom:18px}
.tab{padding:10px 16px;background:transparent;border:none;color:var(--text2);font-weight:600;font-size:13px;border-block-end:2px solid transparent;margin-block-end:-1px}
.tab.active{color:var(--primary);border-block-end-color:var(--primary)}
.tab .dot{display:inline-block;width:6px;height:6px;background:var(--success);border-radius:50%;margin-inline-start:6px;vertical-align:middle}

/* ---------- Detail grid ---------- */
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.field-disp{display:flex;flex-direction:column;gap:3px}
.field-disp .lab{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.field-disp .val{font-size:13.5px;font-weight:500}
.field-disp .val.muted{color:var(--muted);font-style:italic}

/* ---------- Cert rows ---------- */
.cert-list{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cert-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:#fafbfd}
.cert-info .name{font-weight:600;font-size:13px}
.cert-info .date{font-size:12px;color:var(--text2);margin-top:2px}
.cert-state{padding:3px 9px;border-radius:10px;font-size:11px;font-weight:700}
.cs-valid{background:var(--st-complete-bg);color:var(--st-complete-tx)}
.cs-plan{background:#fef9c3;color:#854d0e}
.cs-soon{background:var(--st-warn-bg);color:var(--st-warn-tx)}
.cs-urgent{background:#ffe4e6;color:#9f1239}
.cs-expired{background:var(--st-danger-bg);color:var(--st-danger-tx)}
.cs-missing{background:#f3f4f6;color:#6b7280}

/* ---------- Login ---------- */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f5f6fa 0%,#e8ecf5 100%)}
.login-card{background:#fff;padding:34px;border-radius:16px;box-shadow:var(--shadow-md);width:400px;max-width:92vw}
.login-card .mark{color:var(--primary);font-weight:800;font-size:26px;text-align:center;letter-spacing:1px}
.login-card h1{margin:6px 0 4px;font-size:18px;text-align:center}
.login-card .sub{color:var(--text2);font-size:12.5px;text-align:center;margin-bottom:22px}
.upload-box{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;margin-bottom:20px;background:#fafbfd}
.upload-box .t{font-size:13px;font-weight:600;margin-bottom:4px}
.upload-box .s{color:var(--text2);font-size:12px;margin-bottom:12px}
.upload-inline{display:flex;align-items:center;justify-content:space-between;background:#e0f2fe;border:1px solid #7dd3fc;border-radius:8px;padding:8px 12px;margin-bottom:16px;font-size:12.5px;color:#075985}
.err{color:var(--danger);font-size:12px;margin-top:6px}
.ok{color:var(--success);font-size:12px;margin-top:6px}

/* ---------- Filter bar ---------- */
.filter-bar{background:#fff;border:1px solid var(--border);border-radius:var(--radius-card);padding:14px;margin-bottom:14px;display:flex;gap:12px;align-items:end;flex-wrap:wrap}
.filter-bar .field{margin-bottom:0;min-width:180px}
.filter-bar .count{margin-inline-start:auto;color:var(--text2);font-size:12.5px}

/* ---------- Toast ---------- */
.toast{position:fixed;bottom:20px;inset-inline-end:20px;background:#1a1d2e;color:#fff;padding:12px 18px;border-radius:9px;font-size:13px;box-shadow:var(--shadow-md);z-index:99}

/* ---------- Section header ---------- */
.section-head{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;margin:18px 0 10px;color:var(--text)}
.section-head::before{content:"";width:3px;height:16px;background:var(--primary);border-radius:2px}

/* ---------- RTL adjustments handled by logical props ---------- */
.hero-banner{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:18px 22px;border-radius:var(--radius-card);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.hero-banner .h{font-weight:700;font-size:15px}
.hero-banner .s{opacity:.85;font-size:12.5px;margin-top:2px}
.hero-banner .btn{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)}

/* ---------- Settings ---------- */
.settings-panel{background:#fff;border:1px solid var(--border);border-radius:var(--radius-card);padding:20px}
.list-editor textarea{width:100%;min-height:120px;font-family:ui-monospace,monospace;font-size:12.5px;resize:vertical}
.thresh-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* ---------- Timeline sparkline ---------- */
.spark{display:flex;gap:2px;align-items:end;height:26px;margin-top:8px}
.spark span{flex:1;background:var(--primary-soft);border-radius:2px}

/* Preview modal */
.overlay{position:fixed;inset:0;background:rgba(20,22,40,.45);display:flex;align-items:center;justify-content:center;z-index:20}
.modal{background:#fff;border-radius:12px;padding:22px;max-width:560px;width:92vw;max-height:88vh;overflow:auto}
.modal h3{margin:0 0 6px;font-size:16px}
.modal .mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
</style>
</head>

/* ===================================================
   COMPLIANCE LOGIC
   =================================================== */
const CERT_KEYS = ['wah_practical','wah_theoretical','ra','fa','ff','ec','mcu'];
const SAFETY_ONLY_KEYS = ['ppe_inspection','lifting','scaffolding'];
const CERT_LABEL_KEYS = {
  wah_practical:'cert_wah_p', wah_theoretical:'cert_wah_t',
  ra:'cert_ra', fa:'cert_fa', ff:'cert_ff', ec:'cert_ec', mcu:'cert_mcu',
  ppe_inspection:'cert_ppe', lifting:'cert_lifting', scaffolding:'cert_scaffolding'
};

function applicableCerts(emp){
  return emp.team==='safety' ? [...CERT_KEYS,...SAFETY_ONLY_KEYS] : CERT_KEYS;
}
function daysUntil(dateStr){
  if(!dateStr) return null;
  const d = new Date(dateStr);
  return Math.round((d - today)/86400000);
}
function deriveCertState(dateStr, thr){
  if(!dateStr) return 'missing';
  const d = daysUntil(dateStr);
  if(d < 0) return 'expired';
  if(d <= thr.urgent_days) return 'urgent';
  if(d <= thr.soon_days) return 'soon';
  if(d <= thr.plan_days) return 'plan';
  return 'valid';
}
function stateRank(s){return {expired:5,urgent:4,soon:3,plan:2,missing:1,valid:0}[s]||0;}

function deriveEmployeeCompliance(emp, thr){
  const keys = applicableCerts(emp);
  const per_cert = {};
  let worst='valid';
  let expiring_soon_count=0, expired_count=0;
  keys.forEach(k=>{
    const s = deriveCertState(emp.certificates[k]?.expiry_date, thr);
    per_cert[k]=s;
    if(stateRank(s)>stateRank(worst)) worst=s;
    if(s==='expired') expired_count++;
    if(['urgent','soon','plan'].includes(s)) expiring_soon_count++;
  });
  return {per_cert, worst, expiring_soon_count, expired_count};
}

function deriveSiteCheckVerdict(emp, thr){
  const reasons_blocked = [];
  const reasons_warning = [];
  if(emp.personal.employment_status !== 'Active') reasons_blocked.push(t('reason_not_active'));
  if(emp.personal.archived) reasons_blocked.push(t('reason_archived'));
  if(emp.personal.legal_permission !== 'Approved') reasons_blocked.push(t('reason_legal'));
  const BLOCKER_CERTS = ['wah_practical','wah_theoretical','mcu'];
  const WARNING_CERTS = ['fa','ff','ra','ec'];
  BLOCKER_CERTS.forEach(k=>{
    const dt = emp.certificates[k]?.expiry_date;
    const d = daysUntil(dt);
    if(!dt) return;
    if(d < 0) reasons_blocked.push(t('reason_expired',{cert:t(CERT_LABEL_KEYS[k]),days:Math.abs(d)}));
    else if(d <= thr.urgent_days) reasons_warning.push(t('reason_expiring',{cert:t(CERT_LABEL_KEYS[k]),days:d}));
  });
  WARNING_CERTS.forEach(k=>{
    const dt = emp.certificates[k]?.expiry_date;
    const d = daysUntil(dt);
    if(!dt) return;
    if(d < 0) reasons_warning.push(t('reason_expired',{cert:t(CERT_LABEL_KEYS[k]),days:Math.abs(d)}));
    else if(d <= thr.urgent_days) reasons_warning.push(t('reason_expiring',{cert:t(CERT_LABEL_KEYS[k]),days:d}));
  });
  if(reasons_blocked.length) return {verdict:'blocked', reasons:reasons_blocked};
  if(reasons_warning.length) return {verdict:'warning', reasons:reasons_warning};
  return {verdict:'cleared', reasons:[]};
}

function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}
function fmtDate(s){if(!s)return '—';const d=new Date(s);return d.toLocaleDateString(LANG==='ar'?'ar-EG':'en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function initials(n){return n.split(' ').slice(0,2).map(x=>x[0]||'').join('').toUpperCase();}
function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2000);}

function certStateBadge(s){
  const m={valid:'cs-valid',plan:'cs-plan',soon:'cs-soon',urgent:'cs-urgent',expired:'cs-expired',missing:'cs-missing'};
  const l={valid:'st_valid',plan:'st_plan',soon:'st_soon',urgent:'st_urgent',expired:'st_expired',missing:'st_missing'};
  return `<span class="cert-state ${m[s]}">${t(l[s])}</span>`;
}
function complianceBadge(worst){
  const m={valid:['badge-cleared','st_valid'],plan:['badge-warning','st_plan'],soon:['badge-warning','st_soon'],urgent:['badge-warning','st_urgent'],expired:['badge-blocked','st_expired'],missing:['badge-inactive','st_missing']};
  const [cls,key]=m[worst]||['badge-inactive','st_missing'];
  return `<span class="badge ${cls}">${t(key)}</span>`;
}

function pageDashboard(){
  const thr = DATA.meta.warning_thresholds;
  const active = DATA.employees.filter(e=>!e.personal.archived);
  const fieldEmp = active.filter(e=>e.team==='field');
  const safetyEmp = active.filter(e=>e.team==='safety');
  const comp = active.map(e=>({e,c:deriveEmployeeCompliance(e,thr)}));
  const expired = comp.reduce((s,x)=>s+x.c.expired_count,0);
  const urgent30 = comp.filter(x=>['urgent','expired'].includes(x.c.worst)).length;
  const compliant = comp.filter(x=>x.c.worst==='valid').length;

  // by cert type expiring next 90 days
  const byCert = {};
  active.forEach(e=>applicableCerts(e).forEach(k=>{
    const d = daysUntil(e.certificates[k]?.expiry_date);
    if(d!=null && d>=0 && d<=90){byCert[k]=(byCert[k]||0)+1;}
  }));
  const maxByCert = Math.max(1,...Object.values(byCert));

  // by state
  const byState = {valid:0,plan:0,soon:0,urgent:0,expired:0,missing:0};
  comp.forEach(x=>byState[x.c.worst]++);
  const totalCS = comp.length;

  // by subcontractor
  const bySub = {};
  active.forEach(e=>{const s=e.personal.subcontractor||'—';bySub[s]=(bySub[s]||0)+1;});

  // donut svg
  const stateColors = {valid:'#16a34a',plan:'#eab308',soon:'#f59e0b',urgent:'#f97316',expired:'#dc2626',missing:'#94a3b8'};
  let acc=0;
  const donutSegs = Object.entries(byState).filter(([,v])=>v>0).map(([k,v])=>{
    const frac = v/totalCS;
    const start = acc*2*Math.PI-Math.PI/2;
    const end = (acc+frac)*2*Math.PI-Math.PI/2;
    acc+=frac;
    const large = frac>.5?1:0;
    const r=54,cx=60,cy=60;
    const x1=cx+r*Math.cos(start),y1=cy+r*Math.sin(start);
    const x2=cx+r*Math.cos(end),y2=cy+r*Math.sin(end);
    return `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z" fill="${stateColors[k]}"/>`;
  }).join('');

  return `
    ${renderTopbar(t('nav_dashboard'), fmtDate(today.toISOString().slice(0,10)))}
    <div class="content">
      <div class="hero-banner">
        <div>
          <div class="h">${t('save_to_drive_note')}</div>
          <div class="s">Last backup: ${fmtDate(DATA.meta.last_backup_at)}</div>
        </div>
        <button class="btn">${t('download_backup')}</button>
      </div>

      <div class="kpi-row">
        <div class="kpi blue">
          <div class="n">${fieldEmp.length+safetyEmp.length}</div>
          <div class="l">Total active employees</div>
          <div class="kpi-split"><span><b>${fieldEmp.length}</b> ${t('nav_field')}</span><span><b>${safetyEmp.length}</b> ${t('nav_safety')}</span></div>
        </div>
        <div class="kpi red">
          <div class="n">${expired}</div>
          <div class="l">${t('kpi_expired')}</div>
          <div class="spark">${[3,5,4,6,8,7,expired].map(v=>`<span style="height:${v*3}px"></span>`).join('')}</div>
        </div>
        <div class="kpi amber">
          <div class="n">${urgent30}</div>
          <div class="l">${t('kpi_urgent')}</div>
          <div class="spark">${[2,4,3,5,6,5,urgent30].map(v=>`<span style="height:${v*3}px"></span>`).join('')}</div>
        </div>
        <div class="kpi green">
          <div class="n">${compliant}</div>
          <div class="l">${t('kpi_compliant')}</div>
          <div class="spark">${[8,9,10,9,10,10,compliant].map(v=>`<span style="height:${v*2.5}px"></span>`).join('')}</div>
        </div>
      </div>

      <div class="chart-row">
        <div class="card">
          <h3>${t('chart_by_cert')}</h3>
          ${Object.entries(byCert).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
            <div style="margin-bottom:8px">
              <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:3px"><span>${t(CERT_LABEL_KEYS[k])}</span><span><b>${v}</b></span></div>
              <div style="height:8px;background:#eef1f7;border-radius:4px;overflow:hidden"><div style="width:${(v/maxByCert)*100}%;height:100%;background:var(--primary);border-radius:4px"></div></div>
            </div>
          `).join('')}
        </div>
        <div class="card">
          <h3>${t('chart_by_state')}</h3>
          <div class="donut-wrap">
            <svg width="120" height="120" viewBox="0 0 120 120">
              ${donutSegs}
              <circle cx="60" cy="60" r="30" fill="#fff"/>
              <text x="60" y="58" text-anchor="middle" font-weight="800" font-size="18" fill="#1a1d2e">${totalCS}</text>
              <text x="60" y="74" text-anchor="middle" font-size="10" fill="#4a4f6a">employees</text>
            </svg>
            <div class="donut-legend">
              ${Object.entries(byState).filter(([,v])=>v>0).map(([k,v])=>`
                <div><span class="legend-dot" style="background:${stateColors[k]}"></span>${t('st_'+k)} <b>${v}</b></div>
              `).join('')}
            </div>
          </div>
        </div>
      </div>

      <div class="chart-row">
        <div class="card">
          <h3>${t('chart_by_sub')}</h3>
          ${Object.entries(bySub).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
            <div style="margin-bottom:8px">
              <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:3px"><span>${esc(k)}</span><span><b>${v}</b></span></div>
              <div style="height:8px;background:#eef1f7;border-radius:4px;overflow:hidden"><div style="width:${(v/Math.max(...Object.values(bySub)))*100}%;height:100%;background:var(--teal);border-radius:4px"></div></div>
            </div>
          `).join('')}
        </div>
        <div class="card">
          <h3>${t('recent_activity')}</h3>
          ${[...DATA.employees].sort((a,b)=>b.meta.updated_at.localeCompare(a.meta.updated_at)).slice(0,6).map(e=>`
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
              <div class="avatar" style="width:26px;height:26px;font-size:10px;background:var(--muted)">${initials(e.name)}</div>
              <div style="flex:1;font-size:12.5px"><b>${esc(e.name)}</b> <span style="color:var(--muted)">${e.employee_id}</span></div>
              <div style="font-size:11.5px;color:var(--muted)">${fmtDate(e.meta.updated_at)}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>`;
}

  const filtered = all.filter(e=>{
    if(search && !e.name.toLowerCase().includes(search) && !e.national_id.includes(search)) return false;

    if(titleFilter!=='all' && e.personal.title!==titleFilter) return false;

      const c = deriveEmployeeCompliance(e,thr);

          <label>${t('filter_title')}</label>
          <select onchange="UI.titleFilter=this.value;render()">

function pageRenewals(){
  const thr = DATA.meta.warning_thresholds;
  const active = DATA.employees.filter(e=>!e.personal.archived);
  const rows = [];
  active.forEach(e=>{
    applicableCerts(e).forEach(k=>{
      const dt = e.certificates[k]?.expiry_date;
      if(!dt) return;
      const dl = daysUntil(dt);
      const s = deriveCertState(dt, thr);
      rows.push({emp:e, cert:k, expiry:dt, days:dl, state:s});
    });
  });
  const windowDays = parseInt(UI.rWindow||'90',10);
  const teamFilter = UI.rTeam||'all';
  const filtered = rows.filter(r=>{
    if(teamFilter!=='all' && r.emp.team!==teamFilter) return false;
    if(windowDays>0 && r.days>windowDays) return false;
    return true;
  }).sort((a,b)=>a.days-b.days);

  const rowColor = s=>({expired:'#fef2f2',urgent:'#fff7ed',soon:'#fefce8',plan:'#fefce8',valid:'#fff',missing:'#fff'})[s];

  return `
    ${renderTopbar(t('nav_renewals'), t('renewals_intro'))}
    <div class="content">
      <div class="filter-bar">
        <div class="field">
          <label>Days window</label>
          <select onchange="UI.rWindow=this.value;render()">
            <option value="7" ${UI.rWindow==='7'?'selected':''}>Next 7 days</option>
            <option value="30" ${UI.rWindow==='30'?'selected':''}>Next 30 days</option>
            <option value="60" ${UI.rWindow==='60'?'selected':''}>Next 60 days</option>
            <option value="90" ${!UI.rWindow||UI.rWindow==='90'?'selected':''}>Next 90 days</option>
            <option value="0" ${UI.rWindow==='0'?'selected':''}>All (including expired)</option>
          </select>
        </div>
        <div class="field">
          <label>Team</label>
          <select onchange="UI.rTeam=this.value;render()">
            <option value="all">${t('filter_all')}</option>
            <option value="field" ${UI.rTeam==='field'?'selected':''}>${t('nav_field')}</option>
            <option value="safety" ${UI.rTeam==='safety'?'selected':''}>${t('nav_safety')}</option>
          </select>
        </div>
        <div class="count">${filtered.length} renewals</div>
      </div>

      <table class="tbl">
        <thead><tr>
          <th>Employee</th><th>Team</th><th>Certificate</th><th>Expiry</th><th>Days</th><th>State</th><th>Subcontractor</th>
        </tr></thead>
        <tbody>
          ${filtered.map(r=>`
            <tr class="row-clickable" style="background:${rowColor(r.state)}" onclick="go('employee','${r.emp.employee_id}')">
              <td><b>${esc(r.emp.name)}</b><br><span style="color:var(--muted);font-size:11.5px">${r.emp.employee_id}</span></td>
              <td><span class="badge ${r.emp.team==='field'?'badge-team-field':'badge-team-safety'}">${r.emp.team==='field'?t('nav_field'):t('nav_safety')}</span></td>
              <td>${t(CERT_LABEL_KEYS[r.cert])}</td>
              <td>${fmtDate(r.expiry)}</td>
              <td><b>${r.days>=0?r.days+'d':Math.abs(r.days)+'d '+t('days_ago')}</b></td>
              <td>${certStateBadge(r.state)}</td>
              <td>${esc(r.emp.personal.subcontractor)}</td>
            </tr>
          `).join('')}
          ${filtered.length===0?`<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--muted)">No renewals match filters.</td></tr>`:''}
        </tbody>
      </table>
    </div>`;
}

/* ===================================================
   ACTIONS
   =================================================== */
function onLogin(){
  const u = document.getElementById('uname').value;
  const p = document.getElementById('pwd').value;
  const user = DATA.users.find(x=>x.username===u && x.password===p && x.active);
  if(!user){document.getElementById('login-err').innerHTML=`<div class="err">${t('invalid_creds')}</div>`;return;}
  if(user.role!=='admin'){document.getElementById('login-err').innerHTML=`<div class="err">Desktop app is admin-only. Officers use the mobile app.</div>`;return;}
  CURRENT_USER = user;
  go('dashboard');
}
function signOut(){CURRENT_USER=null;go('login');}
function onSaveEmployee(id){IS_DIRTY=true;toast('Employee saved');go('employee',id.startsWith('new-')?DATA.employees[0].employee_id:id);}
function onExportJson(){IS_DIRTY=false;DATA.meta.last_backup_at=new Date().toISOString();toast('data.json downloaded — drag into Google Drive');render();}

/* ===================================================
   RENDER
   =================================================== */
function render(){
  document.documentElement.lang = LANG;
  document.documentElement.dir = LANG==='ar'?'rtl':'ltr';
  document.documentElement.dataset.theme = THEME;
  const app = document.getElementById('app');
  if(!CURRENT_USER){ app.innerHTML = pageLogin(); return; }
  let page='';
  switch(ROUTE){
    case 'dashboard': page = pageDashboard(); break;
    case 'field':     page = pageEmployeeList('field'); break;
    case 'safety':    page = pageEmployeeList('safety'); break;
    case 'employee':  page = pageEmployeeDetail(); break;
    case 'employee-form': page = pageEmployeeForm(); break;
    case 'renewals':  page = pageRenewals(); break;
    case 'export':    page = pageExport(); break;
    case 'settings':  page = pageSettings(); break;
    default: page = pageDashboard();
  }
  app.innerHTML = `<div class="app">${renderSidebar()}<div class="main">${page}</div></div>`;
}

/* boot */
render();
</script>
